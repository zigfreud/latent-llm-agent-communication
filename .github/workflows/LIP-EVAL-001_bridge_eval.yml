name: LIP-EVAL-001 Bridge Eval

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/LIP-EVAL-001_bridge_eval.yml"
      - "src/scripts/evaluate_bridge.py"
      - "src/scripts/make_toy_shards.py"
      - "src/scripts/validate_latent_bundle.py"
      - "src/scripts/package_latent_bundle.py"
      - "src/pipelines/trainer.py"
      - "src/core/models.py"
      - "src/core/loss.py"
      - "config/LIP-EVAL-001_bridge_eval.yaml"
      - "config/LIP-H0-003_real_tiny_cpu.yaml"
      - "docs/LIP-EVAL-001_bridge_metrics.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge-eval:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install PyYAML numpy pytest

      - name: Compile scripts
        run: |
          python -m compileall \
            src/scripts/evaluate_bridge.py \
            src/scripts/make_toy_shards.py \
            src/scripts/validate_latent_bundle.py \
            src/pipelines/trainer.py

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py

      - name: Generate synthetic full-dim shard
        run: |
          python -m src.scripts.make_toy_shards \
            --output-dir datasets/LIP-H0-003/latent_bundle/shards \
            --num-samples 8 \
            --input-dim 2048 \
            --output-dim 4096

      - name: Create latent bundle manifest
        run: |
          python - <<'PY'
          import datetime as dt
          import hashlib
          import json
          from pathlib import Path

          bundle_dir = Path("datasets/LIP-H0-003/latent_bundle")
          shard_path = bundle_dir / "shards" / "shard_0.pt"
          digest = hashlib.sha256(shard_path.read_bytes()).hexdigest()
          manifest = {
              "bundle_format": "lip_latent_bundle",
              "schema_version": 1,
              "trace_id": "LIP-H0-003",
              "source_model": "synthetic-source",
              "target_model": "synthetic-target",
              "dataset_origin": "synthetic-eval-ci-validation",
              "input_dim": 2048,
              "output_dim": 4096,
              "num_samples": 8,
              "created_at": dt.datetime.now(dt.timezone.utc).replace(microsecond=0).isoformat(),
              "license_notes": "Synthetic generated data for LIP-EVAL-001 CI validation.",
              "extraction_notes": "Generated by src.scripts.make_toy_shards for evaluator CI validation.",
              "shards": [
                  {
                      "path": "shards/shard_0.pt",
                      "records": 8,
                      "sha256": digest,
                  }
              ],
          }
          (bundle_dir / "manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Validate latent bundle
        run: |
          mkdir -p runs/LIP-EVAL-001
          python -m src.scripts.validate_latent_bundle \
            --bundle-dir datasets/LIP-H0-003/latent_bundle \
            --report-json runs/LIP-EVAL-001/bundle_validation_report.json

      - name: Train small checkpoint
        run: |
          python -m src.pipelines.trainer \
            --config config/LIP-H0-003_real_tiny_cpu.yaml \
            --experiment-id LIP-EVAL-001-smoke-train \
            --output-dir runs/LIP-H0-003 \
            --max-steps 2 \
            --device cpu

      - name: Run bridge evaluator
        run: |
          python -m src.scripts.evaluate_bridge \
            --config config/LIP-EVAL-001_bridge_eval.yaml \
            --checkpoint runs/LIP-H0-003/best_model.pth \
            --bundle-dir datasets/LIP-H0-003/latent_bundle \
            --output-dir runs/LIP-EVAL-001

      - name: Verify evaluation outputs
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          output_dir = Path("runs/LIP-EVAL-001")
          metrics_path = output_dir / "eval_metrics.json"
          pairs_path = output_dir / "eval_pairs.csv"
          summary_path = output_dir / "eval_summary.md"

          for path in (metrics_path, pairs_path, summary_path):
              if not path.is_file():
                  raise SystemExit(f"Missing expected evaluation output: {path}")

          metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
          required_keys = [
              "sample_count",
              "input_dim",
              "output_dim",
              "latent_mse_mean",
              "latent_rmse_mean",
              "cosine_diag_mean",
              "cosine_diag_std",
              "prediction_norm_mean",
              "target_norm_mean",
              "norm_ratio_mean",
              "energy_drift_mean",
              "retrieval_top1",
              "retrieval_topk",
              "offdiag_cosine_mean",
              "diagonal_margin_mean",
          ]
          missing = [key for key in required_keys if key not in metrics]
          if missing:
              raise SystemExit(f"eval_metrics.json missing keys: {', '.join(missing)}")

          with pairs_path.open("r", newline="", encoding="utf-8") as handle:
              rows = list(csv.DictReader(handle))
          if not rows:
              raise SystemExit("eval_pairs.csv has no data rows")

          print(f"Validated {len(rows)} bridge evaluation pair rows")
          PY

      - name: Upload bridge eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIP-EVAL-001-${{ github.run_id }}-bridge-eval
          path: runs/LIP-EVAL-001
          if-no-files-found: error
          retention-days: 7
