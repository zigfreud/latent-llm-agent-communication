name: LIP-H0-001 Remote CPU Smoke

on:
  pull_request:
    branches:
      - feature/lip-v2-contrastive
    paths:
      - ".github/workflows/LIP-H0-001_remote_cpu_smoke.yml"
      - "config/LIP-H0-001_cpu_smoke.yaml"
      - "src/scripts/make_toy_shards.py"
      - "src/pipelines/trainer.py"
      - "src/core/models.py"
      - "src/core/loss.py"
      - "src/core/utils.py"
  workflow_dispatch:
    inputs:
      experiment_id:
        description: Experiment identifier used for trainer metadata and artifact naming.
        required: false
        default: LIP-H0-001
        type: string
      config:
        description: Trainer config path.
        required: false
        default: config/LIP-H0-001_cpu_smoke.yaml
        type: string
      num_samples:
        description: Number of toy shard samples to generate.
        required: false
        default: "12"
        type: string
      input_dim:
        description: Source vector dimension for generated toy shards.
        required: false
        default: "16"
        type: string
      output_dim:
        description: Target vector dimension for generated toy shards.
        required: false
        default: "16"
        type: string
      max_steps:
        description: Maximum trainer steps for the smoke run.
        required: false
        default: "3"
        type: string

permissions:
  contents: read

env:
  EXPERIMENT_ID: ${{ github.event.inputs.experiment_id || 'LIP-H0-001' }}
  CONFIG_PATH: ${{ github.event.inputs.config || 'config/LIP-H0-001_cpu_smoke.yaml' }}
  NUM_SAMPLES: ${{ github.event.inputs.num_samples || '12' }}
  INPUT_DIM: ${{ github.event.inputs.input_dim || '16' }}
  OUTPUT_DIM: ${{ github.event.inputs.output_dim || '16' }}
  MAX_STEPS: ${{ github.event.inputs.max_steps || '3' }}
  RUN_OUTPUT_DIR: runs/${{ github.event.inputs.experiment_id || 'LIP-H0-001' }}

jobs:
  cpu-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-compatible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install PyYAML numpy

      - name: Resolve configured dataset path
        run: |
          python - <<'PY'
          import os
          import yaml

          config_path = os.environ["CONFIG_PATH"]
          with open(config_path, "r", encoding="utf-8") as handle:
              config = yaml.safe_load(handle) or {}

          dataset_path = config.get("data", {}).get("dataset_path")
          if not dataset_path:
              raise SystemExit(f"{config_path} is missing data.dataset_path")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"DATASET_PATH={dataset_path}\n")

          print(f"DATASET_PATH={dataset_path}")
          PY

      - name: Generate toy shards
        run: |
          python -m src.scripts.make_toy_shards \
            --output-dir "$DATASET_PATH" \
            --num-samples "$NUM_SAMPLES" \
            --input-dim "$INPUT_DIM" \
            --output-dim "$OUTPUT_DIM"

      - name: Run CPU smoke trainer
        run: |
          python -m src.pipelines.trainer \
            --config "$CONFIG_PATH" \
            --experiment-id "$EXPERIMENT_ID" \
            --output-dir "$RUN_OUTPUT_DIR" \
            --max-steps "$MAX_STEPS" \
            --device cpu

      - name: Validate smoke outputs
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path

          output_dir = Path(os.environ["RUN_OUTPUT_DIR"])
          required_files = [
              "metrics.json",
              "train_log.csv",
              "run_summary.md",
              "last_checkpoint.pth",
              "best_model.pth",
          ]
          missing = [name for name in required_files if not (output_dir / name).is_file()]
          if missing:
              raise SystemExit(f"Missing expected output files: {', '.join(missing)}")

          with open(output_dir / "metrics.json", "r", encoding="utf-8") as handle:
              metrics = json.load(handle)

          expected_experiment = os.environ["EXPERIMENT_ID"]
          if metrics.get("experiment_id") != expected_experiment:
              raise SystemExit(
                  f"Expected experiment_id={expected_experiment}, got {metrics.get('experiment_id')}"
              )

          max_steps = int(os.environ["MAX_STEPS"])
          steps_completed = int(metrics.get("steps_completed", 0))
          if steps_completed <= 0:
              raise SystemExit("Trainer completed zero steps")
          if steps_completed > max_steps:
              raise SystemExit(
                  f"Trainer completed {steps_completed} steps, exceeding max_steps={max_steps}"
              )

          with open(output_dir / "train_log.csv", "r", encoding="utf-8") as handle:
              rows = list(csv.DictReader(handle))
          if len(rows) != steps_completed:
              raise SystemExit(
                  f"train_log.csv has {len(rows)} rows, expected {steps_completed}"
              )

          print(f"Validated {steps_completed} smoke training step(s) in {output_dir}")
          PY

      - name: Append run summary
        if: always()
        run: |
          if [ -f "$RUN_OUTPUT_DIR/run_summary.md" ]; then
            cat "$RUN_OUTPUT_DIR/run_summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# ${EXPERIMENT_ID} Remote CPU Smoke"
              echo
              echo "run_summary.md was not produced."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPERIMENT_ID }}-${{ github.run_id }}-remote-cpu-smoke
          path: ${{ env.RUN_OUTPUT_DIR }}
          if-no-files-found: warn
          retention-days: 7
