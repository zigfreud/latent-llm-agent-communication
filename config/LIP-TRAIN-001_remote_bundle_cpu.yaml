experiment_id: "LIP-TRAIN-001"
experiment_name: "LIP-TRAIN-001 Configurable Remote Bundle Training"
device: "cpu"
output_dir: "runs/LIP-TRAIN-001"
seed: 42

data:
  dataset_path: "datasets/LIP-TRAIN-001/latent_bundle/shards"
  batch_size: 2
  num_workers: 0
  drop_last: true

model:
  input_dim: 2048
  hidden_dim: 1024
  output_dim: 4096

training:
  epochs: 8
  max_steps: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  resume: false

loss:
  temperature: 0.1
  lambda_mse: 0.1
