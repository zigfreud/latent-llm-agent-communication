trace_id: "LIP-DATA-001"
bundle_format: "lip_latent_bundle"
schema_version: 1

models:
  source_model: "deepseek-ai/deepseek-coder-1.3b-base"
  target_model: "NousResearch/Meta-Llama-3-8B-Instruct"

prompt_protocol:
  version: "lip-prompt-v1"
  mode: "raw"
  add_generation_prompt: false
  system_prompt: null

extraction:
  device: "auto"
  source_layer: -1
  target_layer: -1
  token_position: "last_non_padding"
  max_length: 256
  batch_size: 1
  dtype: "auto"
  trust_remote_code: true
  sequential_model_loading: true
  low_cpu_mem_usage: true
  device_map: "auto"
  load_in_4bit: true
  cache_dir: null
  local_files_only: false

vectors:
  input_dim: 2048
  output_dim: 4096

data:
  dataset_origin: "LIP-DATA-001 curated 8-prompt code task set"
  prompt_policy: "Eight small, non-sensitive, self-contained programming prompts for real latent bundle scaling."
  prompts:
    - "Write a Python function that returns the nth Fibonacci number."
    - "Write a Python function that checks whether a string is a palindrome."
    - "Write a Python function that sums numeric values in a list."
    - "Write a Python function that counts words in a string."
    - "Write a Python function that finds the maximum value in a list."
    - "Write a Python function that removes duplicate items from a list while preserving order."
    - "Write a Python function that merges two dictionaries."
    - "Write a Python function that sorts a list of dictionaries by a given key."

output:
  bundle_dir: "datasets/LIP-DATA-001/real_bundle_8"
  output_zip: "datasets/LIP-DATA-001/LIP-DATA-001_real_latent_bundle_8.zip"
  shard_name: "shard_0.pt"
