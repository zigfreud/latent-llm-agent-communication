trace_id: "LIP-H0-005"
bundle_format: "lip_latent_bundle"
schema_version: 1

models:
  source_model: "deepseek-ai/deepseek-coder-1.3b-base"
  target_model: "NousResearch/Meta-Llama-3-8B-Instruct"

extraction:
  device: "auto"
  source_layer: -1
  target_layer: -1
  token_position: "last"
  max_length: 256
  batch_size: 1
  dtype: "auto"
  trust_remote_code: true
  sequential_model_loading: true

vectors:
  input_dim: 2048
  output_dim: 4096

data:
  dataset_origin: "LIP-H0-005 curated tiny prompt set"
  prompt_policy: "Small curated non-sensitive prompts for latent bundle smoke testing."
  prompts:
    - "Write a Python function that returns the nth Fibonacci number."
    - "Write a Python function that checks whether a string is a palindrome."
    - "Write a Python function that sums numeric values in a list."
    - "Write a Python function that counts words in a string."

output:
  bundle_dir: "datasets/LIP-H0-005/real_tiny_bundle"
  output_zip: "datasets/LIP-H0-005/LIP-H0-005_real_tiny_latent_bundle.zip"
  shard_name: "shard_0.pt"
