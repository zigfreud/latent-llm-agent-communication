experiment:
  name: "LIP_vs_JSON_Quantitative_Analysis_Gen6"
  iterations: 5
  warmup: 2

models:
  source:
    path: "deepseek-ai/deepseek-coder-1.3b-base"
  target:
    path: "NousResearch/Meta-Llama-3-8B-Instruct"
  adapter:
    path: "checkpoints/Gen6.2/adapter_pth"
    input_dim: 2048
    bottleneck_dim: 1024 
    output_dim: 4096

test_cases:
  - category: "short_instruction"
    id: "hello_world_python"
    prompt: "Write a python function that prints 'Hello World'"

  - category: "code_generation"
    id: "game_loop"
    prompt: "Create a simple Python game. The game should contain a main loop that runs infinitely. The user should be able to type commands."

  - category: "heavy_context_rag_simulation"
    id: "log_analysis"
    # Long prompt simulating RAG (expanded by the script).
    prompt: |
      Analyze the following log trace and extract error codes.
      Context:
      [2025-01-01 10:00:01] INFO Starting service...
      [2025-01-01 10:00:02] DEBUG Loading configuration from /etc/app/config.yml
      [2025-01-01 10:00:03] INFO Boot sequence initiated
      [2025-01-01 10:00:04] DEBUG Connecting to DB...
      [2025-01-01 10:00:05] WARN DB connection latency high
      [2025-01-01 10:00:06] INFO DB connection established
      [2025-01-01 10:00:07] DEBUG Warming cache region=users
      Task: Return a list of error timestamps.

